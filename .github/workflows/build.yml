name: Build CantineSetup.exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install reportlab pillow pyinstaller

      - name: Build Cantine.exe with PyInstaller
        run: |
          python -m PyInstaller --onefile --windowed --name "Cantine" --icon "cantine.ico" --add-data "cantine.ico;." main.py

      - name: Install NSIS
        run: |
          choco install nsis --yes

      - name: Build CantineSetup.exe with NSIS
        run: |
          makensis installer.nsi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gestion Cantine ${{ github.ref_name }}"
          body: |
            ## Gestion de Cantine ${{ github.ref_name }}

            ### Comment installer
            1. Telechargez **CantineSetup.exe** ci-dessous
            2. Double-cliquez dessus
            3. Suivez les etapes d installation
            4. L application se lance automatiquement
            5. Mot de passe : `1234`

            ### Desinstallation
            Panneau de configuration -> Programmes -> Gestion Cantine -> Desinstaller
          files: CantineSetup.exe
