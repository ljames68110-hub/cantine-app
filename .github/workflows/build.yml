name: Build CantineSetup.exe

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install reportlab pillow pyinstaller

      - name: Build Cantine.exe
        run: python -m PyInstaller --onefile --windowed --name "Cantine" --icon "cantine.ico" --add-data "cantine.ico;." main.py

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build CantineSetup.exe
        shell: cmd
        run: '"C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gestion Cantine ${{ github.ref_name }}"
          body: |
            ## Gestion de Cantine ${{ github.ref_name }}

            1. Telechargez CantineSetup.exe
            2. Double-cliquez
            3. Suivez l installation
            4. Mot de passe : 1234
          files: CantineSetup.exe
